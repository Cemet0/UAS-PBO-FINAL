## ============================================================================
## EmberLord — Backend Configuration
## ============================================================================
## Semua nilai dapat di-override melalui environment variable.
## Format: ${NAMA_VARIABEL:nilai_default}
## ============================================================================

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Database (default: H2 In-Memory) ──────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:emberlorddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# ── H2 Console ────────────────────────────────────────────────────────────────
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}
spring.h2.console.settings.web-allow-others=${SPRING_H2_CONSOLE_WEB_ALLOW_OTHERS:true}

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:15MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:15MB}
server.tomcat.max-swallow-size=${MAX_FILE_SIZE:15MB}
server.tomcat.max-http-form-post-size=${MAX_REQUEST_SIZE:15MB}

# ── Chatbot / LLM (dibaca frontend via /api/env-config.js) ────────────────────
llm.provider=${LLM_PROVIDER:ollama}
llm.ollama.api-url=${OLLAMA_API_URL:http://localhost:11434/v1/chat/completions}
llm.ollama.model=${OLLAMA_MODEL:llama3.2}
llm.openai.api-key=${OPENAI_API_KEY:}
llm.openai.model=${OPENAI_MODEL:gpt-4o-mini}
llm.gemini.api-key=${GEMINI_API_KEY:}
llm.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
llm.github.token=${GITHUB_TOKEN:}
llm.github.model=${GITHUB_MODEL:gpt-4o-mini}
llm.github.api-url=${GITHUB_API_URL:https://models.inference.ai.azure.com/chat/completions}
