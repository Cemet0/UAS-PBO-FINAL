# Konfigurasi Port Server
server.port=8080

# Konfigurasi Koneksi Database H2 (In-Memory)
spring.datasource.url=jdbc:h2:mem:emberlorddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dialek JPA/Hibernate untuk H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Aktifkan H2 Web Console untuk Debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Konfigurasi batas upload file dan request size (terutama untuk Base64 image JSON)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
server.tomcat.max-swallow-size=15MB
server.tomcat.max-http-form-post-size=15MB
